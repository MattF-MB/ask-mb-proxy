<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask MB</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { width: 100%; max-width: 760px; height: 100vh; display: flex; flex-direction: column; background: white; }
  .header { background: #21376D; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: #00BCE3; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; font-size: 13px; }
  .header-text h1 { color: white; font-size: 16px; font-weight: 500; }
  .header-text p { color: #00BCE3; font-size: 12px; }
  .status { width: 8px; height: 8px; border-radius: 50%; background: #6CC24A; margin-left: auto; }
  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .message { display: flex; align-items: flex-end; gap: 8px; }
  .message.user { justify-content: flex-end; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: #21376D; display: flex; align-items: center; justify-content: center; color: #00BCE3; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .bubble { max-width: 75%; padding: 10px 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .bubble.assistant { background: #f0f0f0; border-radius: 16px 16px 16px 4px; color: #333; }
  .bubble.user { background: #21376D; border-radius: 16px 16px 4px 16px; color: white; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; background: #f0f0f0; border-radius: 16px 16px 16px 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #00BCE3; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .input-area { padding: 12px 16px; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; align-items: flex-end; }
  textarea { flex: 1; resize: none; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; line-height: 1.5; background: #f9f9f9; }
  textarea:focus { border-color: #00BCE3; }
  button { width: 40px; height: 40px; border-radius: 8px; background: #21376D; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  button:disabled { background: #ccc; cursor: default; }
  button svg { fill: white; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">MB</div>
    <div class="header-text">
      <h1>Ask MB</h1>
      <p>Magical Beginnings Assistant</p>
    </div>
    <div class="status"></div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Ask about policies, procedures, resources..." rows="1"></textarea>
    <button id="sendBtn" onclick="send()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
const PROXY_URL = '/api/search';
const ANTHROPIC_URL = 'https://api.anthropic.com/v1/messages';

let loading = false;

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (role === 'assistant') {
    div.innerHTML = `<div class="msg-avatar">MB</div><div class="bubble assistant">${text}</div>`;
  } else {
    div.innerHTML = `<div class="bubble user">${text}</div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">MB</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function send() {
  const input = document.getElementById('input');
  const q = input.value.trim();
  if (!q || loading) return;
  input.value = '';
  loading = true;
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', q);
  showTyping();

  try {
    const pineconeRes = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q }),
    });
    const pineconeData = await pineconeRes.json();
    const hits = pineconeData.result?.hits || [];
    const context = hits.length > 0
      ? hits.map(h => `[${h.fields?.filename || 'document'}]:\n${h.fields?.text || ''}`).join('\n\n---\n\n')
      : 'No relevant documents found.';

    const claudeRes = await fetch(ANTHROPIC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are Ask MB, a helpful internal AI assistant for Magical Beginnings, an early childhood education company. Answer the employee's question using ONLY the document excerpts provided. Be clear, helpful, and concise. If the answer is not in the excerpts, say so and suggest contacting HR or their manager.`,
        messages: [{ role: 'user', content: `Question: ${q}\n\nRelevant excerpts:\n\n${context}` }],
      }),
    });
    const claudeData = await claudeRes.json();
    hideTyping();
    addMessage('assistant', claudeData.content?.[0]?.text || 'Sorry, could not generate a response.');
  } catch(e) {
    hideTyping();
    addMessage('assistant', `Error: ${e.message}`);
  }

  loading = false;
  document.getElementById('sendBtn').disabled = false;
}

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

addMessage('assistant', 'Welcome to Ask MB! I\'m here to help you find answers about our company policies, resources, and procedures. Just ask and I\'ll find the answer for you.');
</script>
</body>
</html>
